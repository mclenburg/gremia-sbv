name: Build tagged release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: tagged-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GREMIA_SBV_E2E_USE_SYSTEM_CHROME: "1"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify tag matches package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "Tag version ${tag_version} does not match package.json version ${package_version}" >&2
            exit 1
          fi

          prerelease="false"
          if [[ "${tag_version}" =~ (alpha|beta|rc) ]]; then
            prerelease="true"
          fi

          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  quality-gates:
    name: Run release quality gates
    runs-on: ubuntu-latest
    needs: verify-tag
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Install isolated E2E tools
        timeout-minutes: 5
        run: npm run test:e2e:setup

      - name: Audit production and build dependencies
        run: npm run security:audit

      - name: Generate third-party license inventory
        run: npm run licenses:generate

      - name: Verify third-party license inventory
        run: npm run licenses:check

      - name: Run RC, coverage and build gates
        run: npm run release:check

      - name: Run visual, behaviour and accessibility E2E gates
        timeout-minutes: 15
        run: |
          npm run test:e2e:visual
          npm run test:e2e:core-ui-flows
          npm run test:e2e:complete-tour
          npm run test:e2e:a11y

  prepare-release:
    name: Prepare draft GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - quality-gates
    timeout-minutes: 10
    steps:
      - name: Create draft release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ needs.verify-tag.outputs.package_version }}
          IS_PRERELEASE: ${{ needs.verify-tag.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; platform jobs will upload assets directly."
            exit 0
          fi

          release_args=(
            "${GITHUB_REF_NAME}"
            --draft
            --title "Gremia.SBV ${PACKAGE_VERSION}"
            --notes "Automatisch vorbereiteter Draft-Release für ${GITHUB_REF_NAME}."
          )
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"

  build-artifacts:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs:
      - verify-tag
      - quality-gates
      - prepare-release
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            label: Linux AppImage
            os: ubuntu-latest
            build_script: build:linux
            artifact_glob: |
              release/*.AppImage
          - platform: windows
            label: Windows portable EXE
            os: windows-latest
            build_script: build:win
            artifact_glob: |
              release/*.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build signed-off platform artifact
        run: npm run ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload platform asset directly to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ needs.verify-tag.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
