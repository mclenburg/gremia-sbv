name: Build and Release Electron App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            build_script: build:linux
            artifact_glob: |
              release/*.AppImage

          - platform: windows
            os: windows-latest
            build_script: build:win
            artifact_glob: |
              release/*.exe

 #         - platform: macos
 #           os: macos-latest
 #           build_script: build:mac
 #           artifact_glob: |
 #             release/*.dmg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright and Axe E2E dependencies
        run: npm run test:e2e:setup

      - name: Audit production and build dependencies
        run: npm run security:audit

      - name: Generate third-party license inventory
        run: npm run licenses:generate

      - name: Verify third-party license inventory
        run: npm run licenses:check

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Verify release readiness
        run: npm run release:check

      - name: Verify visual, behaviour and accessibility E2E gates
        run: npm run test:e2e:visual && npm run test:e2e:core-ui-flows && npm run test:e2e:complete-tour && npm run test:e2e:a11y

      - name: Build artifact
        run: npm run ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

  #    - name: Upload workflow artifact
  #      uses: actions/upload-artifact@v4
  #      with:
  #        name: gremia-sbv-${{ matrix.platform }}
  #        path: ${{ matrix.artifact_glob }}
  #        if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: ${{ matrix.artifact_glob }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
