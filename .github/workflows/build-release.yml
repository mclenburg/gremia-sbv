name: Build and Release Electron App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            build_script: build:linux
            artifact_glob: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz
              release/*.blockmap
              release/latest-linux.yml

          - platform: windows
            os: windows-latest
            build_script: build:win
            artifact_glob: |
              release/*.exe
              release/*.msi
              release/*.zip
              release/*.blockmap
              release/latest.yml

          - platform: macos
            os: macos-latest
            build_script: build:mac
            artifact_glob: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Verify release readiness
        run: npm run rc:check && npm run test:coverage
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build artifact
        run: npm run ${{ matrix.build_script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: gremia-sbv-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
