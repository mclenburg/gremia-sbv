<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
<title id="title">Datenfluss UI bis Datenbank</title>
<desc id="desc">Visualisiert den Weg von React UI über Preload Bridge, IPC, Services und Policies bis zur lokalen SQLCipher-Datenbank.</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,4 L0,8 z" fill="#333" />
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1f2933; }
    .caption { font-size: 12px; fill: #46525f; }
    .group-title { font-size: 15px; font-weight: 700; fill: #26323f; }
  </style>
</defs>
<rect x="0" y="0" width="1180" height="660" fill="#ffffff"/>

<text x="30" y="36" font-size="22" font-weight="700">Datenfluss UI bis Datenbank</text>
<rect x="40" y="80" width="150" height="60" rx="10" fill="#eaf3ff" stroke="#3b6ea8" stroke-width="1.4"/>
<text x="115.0" y="104" text-anchor="middle" font-size="14" font-weight="700">SBV-Nutzer/in</text>
<text x="115.0" y="122" text-anchor="middle" font-size="12" font-weight="400">Interaktion</text>
<rect x="240" y="80" width="170" height="60" rx="10" fill="#eaf3ff" stroke="#3b6ea8" stroke-width="1.4"/>
<text x="325.0" y="104" text-anchor="middle" font-size="14" font-weight="700">React UI</text>
<text x="325.0" y="122" text-anchor="middle" font-size="12" font-weight="400">Views, Panels, Dialoge</text>
<rect x="460" y="80" width="190" height="60" rx="10" fill="#eaf3ff" stroke="#3b6ea8" stroke-width="1.4"/>
<text x="555.0" y="104" text-anchor="middle" font-size="14" font-weight="700">Shared UI</text>
<text x="555.0" y="122" text-anchor="middle" font-size="12" font-weight="400">IndustrialField, TextCommandTextarea</text>
<rect x="700" y="80" width="180" height="60" rx="10" fill="#eaf3ff" stroke="#3b6ea8" stroke-width="1.4"/>
<text x="790.0" y="104" text-anchor="middle" font-size="14" font-weight="700">Feature-Hooks</text>
<text x="790.0" y="122" text-anchor="middle" font-size="12" font-weight="400">Status, Validierung</text>
<rect x="930" y="80" width="190" height="60" rx="10" fill="#f7eefd" stroke="#7c4aa5" stroke-width="1.4"/>
<text x="1025.0" y="104" text-anchor="middle" font-size="14" font-weight="700">Preload Bridge</text>
<text x="1025.0" y="122" text-anchor="middle" font-size="12" font-weight="400">window.gremiaSbv</text>
<path d="M 190 110 L 240 110" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<path d="M 410 110 L 460 110" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<path d="M 650 110 L 700 110" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<path d="M 880 110 L 930 110" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<rect x="490" y="220" width="200" height="62" rx="10" fill="#f7eefd" stroke="#7c4aa5" stroke-width="1.4"/>
<text x="590.0" y="244" text-anchor="middle" font-size="14" font-weight="700">Electron IPC Handler</text>
<text x="590.0" y="262" text-anchor="middle" font-size="12" font-weight="400">validierte Kanalgrenzen</text>
<path d="M 1025 140 L 590 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<rect x="490" y="330" width="200" height="62" rx="10" fill="#eef8f1" stroke="#2d7a46" stroke-width="1.4"/>
<text x="590.0" y="354" text-anchor="middle" font-size="14" font-weight="700">Node Services</text>
<text x="590.0" y="372" text-anchor="middle" font-size="12" font-weight="400">fachliche Orchestrierung</text>
<path d="M 590 282 L 590 330" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<rect x="190" y="450" width="190" height="62" rx="10" fill="#fff7e6" stroke="#a66a00" stroke-width="1.4"/>
<text x="285.0" y="474" text-anchor="middle" font-size="14" font-weight="700">Pure Policies</text>
<text x="285.0" y="492" text-anchor="middle" font-size="12" font-weight="400">Regeln ohne DB-Zugriff</text>
<rect x="490" y="450" width="200" height="62" rx="10" fill="#f0f0f0" stroke="#666666" stroke-width="1.4"/>
<text x="590.0" y="474" text-anchor="middle" font-size="14" font-weight="700">SQLCipher SQLite</text>
<text x="590.0" y="492" text-anchor="middle" font-size="12" font-weight="400">verschlüsselte lokale DB</text>
<rect x="800" y="450" width="180" height="62" rx="10" fill="#f7eefd" stroke="#7c4aa5" stroke-width="1.4"/>
<text x="890.0" y="474" text-anchor="middle" font-size="14" font-weight="700">Audit / Hash Chain</text>
<text x="890.0" y="492" text-anchor="middle" font-size="12" font-weight="400">datensparsam</text>
<rect x="270" y="560" width="190" height="62" rx="10" fill="#fff7e6" stroke="#a66a00" stroke-width="1.4"/>
<text x="365.0" y="584" text-anchor="middle" font-size="14" font-weight="700">Reports / Exporte</text>
<text x="365.0" y="602" text-anchor="middle" font-size="12" font-weight="400">Privacy Guards</text>
<rect x="600" y="560" width="190" height="62" rx="10" fill="#fff7e6" stroke="#a66a00" stroke-width="1.4"/>
<text x="695.0" y="584" text-anchor="middle" font-size="14" font-weight="700">Backup / Restore</text>
<text x="695.0" y="602" text-anchor="middle" font-size="12" font-weight="400">verschlüsselte Pakete</text>
<path d="M 490 361 L 380 481" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="435.0" y="413.0" text-anchor="middle" font-size="11" fill="#555">prüft Regeln</text>
<path d="M 590 392 L 590 450" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="590.0" y="413.0" text-anchor="middle" font-size="11" fill="#555">persistiert</text>
<path d="M 690 361 L 800 481" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="745.0" y="413.0" text-anchor="middle" font-size="11" fill="#555">protokolliert</text>
<path d="M 520 392 L 365 560" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="442.5" y="468.0" text-anchor="middle" font-size="11" fill="#555">Exportpfad</text>
<path d="M 610 512 L 695 560" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="652.5" y="528.0" text-anchor="middle" font-size="11" fill="#555">Backup-Pfad</text>
</svg>